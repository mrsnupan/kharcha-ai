name: Build KharchaAI APK

on:
  push:
    branches: [ main ]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x android/gradlew
        working-directory: ${{ github.workspace }}

      - name: Build Release APK
        run: ./gradlew assembleRelease
        working-directory: android

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: KharchaAI-APK
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: KharchaAI v${{ github.run_number }}
          files: android/app/build/outputs/apk/release/app-release-unsigned.apk
          body: |
            ## KharchaAI Android App

            ### Install Instructions:
            1. Download `app-release-unsigned.apk`
            2. On your Android phone: Settings → Security → Allow Unknown Sources
            3. Open the downloaded APK and install
            4. Open app → enter your WhatsApp number → enter OTP
            5. Allow SMS permission → Done!

            ### What this app does:
            - Runs silently in background
            - Detects bank SMS automatically
            - Forwards to KharchaAI for logging
            - You get WhatsApp confirmation for every transaction
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
